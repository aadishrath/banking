services:
  - type: web
    name: banking-api
    env: node
    rootDir: .
    buildCommand: npm install
    startCommand: npm run start:api
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: banking-postgres
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CLIENT_ORIGIN
        value: https://your-vercel-frontend-domain.vercel.app

databases:
  - name: banking-postgres
    databaseName: banking_app
    user: banking_app
